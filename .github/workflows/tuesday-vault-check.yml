name: Tuesday Vault Check

on:
  schedule:
    - cron: '0 22 * * 2' # Every Tuesday at 6:00 PM EST (22:00 UTC)
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Sync Historical Activity Endpoint
        run: |
          curl -X GET "https://dark-intentions.pages.dev/api/sync-historical-activity" \
          -H "Accept: application/json"
